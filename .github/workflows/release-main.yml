name: Build and Release (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: software/go.mod
          cache-dependency-path: software/go.sum

      - name: Build production executable
        shell: pwsh
        working-directory: software
        run: ./build-production.ps1 -Output esp-hid-bridge.exe

      - name: Prepare release metadata
        id: meta
        shell: pwsh
        run: |
          $latest = git tag --list "v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | Select-Object -First 1

          if (-not $latest) {
            $nextTag = "v1.0.0"
          } else {
            if ($latest -notmatch '^v(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$') {
              throw "Latest semantic version tag '$latest' is not in vMAJOR.MINOR.PATCH format"
            }

            $major = [int]$Matches.major
            $minor = [int]$Matches.minor
            $patch = [int]$Matches.patch + 1
            $nextTag = "v$major.$minor.$patch"
          }

          "tag=$nextTag" >> $env:GITHUB_OUTPUT
          "name=Release $nextTag" >> $env:GITHUB_OUTPUT

      - name: Package release bundle
        id: package
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $bundleDir = "release-bundle"
          $zipName = "esp-hid-bridge-$tag-windows-x64.zip"

          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null
          Copy-Item software/esp-hid-bridge.exe "$bundleDir/"

          Compress-Archive -Path "$bundleDir/*" -DestinationPath $zipName -Force

          "zip=$zipName" >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.package.outputs.zip }}
